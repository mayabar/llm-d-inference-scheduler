apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen3-2b-instruct-epp
  labels:
    app: vllm-qwen3-2b-instruct-epp
spec:
  selector:
    matchLabels:
      app: vllm-qwen3-2b-instruct-epp
  template:
    metadata:
      labels:
        app: vllm-qwen3-2b-instruct-epp
    spec:
      containers:
        - args:
            - --poolName
            - qwen3-2b-instruct
            - --poolNamespace
            - serverless-workstream
            - -v
            - "4"
            - --zap-encoder
            - json
            - --grpcPort
            - "9002"
            - --grpcHealthPort
            - "9003"
          env:
            - name: PD_ENABLED
              value: "true"
            - name: PD_PROMPT_LEN_THRESHOLD
              value: "10"
          image: ghcr.io/llm-d/llm-d-router-endpoint-picker:0.0.3
          imagePullPolicy: Always
          name: epp
          ports:
            - containerPort: 9002
              protocol: TCP
            - containerPort: 9003
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP
          livenessProbe:
            grpc:
              port: 9003
              service: envoy.service.ext_proc.v3.ExternalProcessor
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 9003
              service: envoy.service.ext_proc.v3.ExternalProcessor
            initialDelaySeconds: 5
            periodSeconds: 10
